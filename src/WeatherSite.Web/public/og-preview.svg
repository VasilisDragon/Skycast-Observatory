<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="sky" cx="18%" cy="14%" r="90%">
      <stop offset="0%" stop-color="#7CD3FF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#142642"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="markArc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A8C4FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="220" fill="url(#glow)"/>

  <g transform="translate(88 96)">
    <path d="M60 0A60 60 0 1 0 60 120 42 42 0 0 1 60 36 60 60 0 0 0 60 0z" fill="url(#markArc)"/>
  </g>

  <text x="232" y="195" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="500" fill="#F4F7FC" letter-spacing="-1.2">
