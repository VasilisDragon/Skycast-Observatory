    <text x="24" y="38" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#7CD3FF" letter-spacing="3">NOW</text>
    <text x="24" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="84" fill="#FFFFFF" letter-spacing="-2">72°</text>
    <text x="24" y="136" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#A8C4FF">Clear · Chicago</text>
  </g>

  <text x="88" y="580" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#94A0B2" letter-spacing="2">
